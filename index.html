<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StructraGap AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <div class="card">
        <h1 class="logo">StructraGap <span class="light-text">AI</span></h1>

        <div class="container-2">
            
            <img src="logo.png" alt="[City Skyline Image Place]" class="hero-image">
            
            <div class="input1">
                <h2>Preventing building collision during an earthquake</h2>
                <div class="upload-box">
                    <label class="upload-btn">Upload Image
                        <input type="file" accept="image/*" hidden class="img-input">
                    </label>
                    <span class="or-text">OR</span>
                    <span class="drop-text">drop a file here</span>
                </div>
            </div>

        </div>
    </div>
<script src="index.js"></script>
</body>
</html>
